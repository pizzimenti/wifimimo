name: Bug report
description: Report a reproducible problem in wifimimo
title: "[bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please include enough detail for someone else to reproduce the problem.
  - type: input
    id: version
    attributes:
      label: Version
      description: Which wifimimo version are you using?
      placeholder: 0.2.0
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the project is affected?
      options:
        - daemon
        - terminal monitor
        - plasmoid
        - install script
        - documentation
        - other
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Distribution, kernel, Plasma version, and Wi-Fi hardware
      placeholder: Fedora 42, kernel 6.x, Plasma 6.x, Intel AX210
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start the daemon
        2. Open the plasmoid popup
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or additional context
      description: Paste relevant output from the terminal, journal, or screenshots here.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checklist
      options:
        - label: I searched existing issues first.
          required: true
        - label: I included the version and environment details above.
          required: true
