name: Support question
description: Ask a setup or usage question
title: "[support]: "
labels:
  - question
body:
  - type: markdown
    attributes:
      value: |
        Use this form for setup help or usage questions that do not look like clear bugs.
  - type: input
    id: version
    attributes:
      label: Version
      description: Which wifimimo version are you using?
      placeholder: 0.2.0
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Distribution, kernel, Plasma version, and Wi-Fi hardware if relevant
      placeholder: Fedora 42, kernel 6.x, Plasma 6.x, Intel AX210
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: attempted
    attributes:
      label: What you already tried
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      render: shell
