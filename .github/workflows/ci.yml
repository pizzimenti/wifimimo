name: CI

on:
  push:
    branches:
      - main
      - "fix/**"
      - "feat/**"
      - "chore/**"
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate Python syntax
        run: |
          python -m py_compile \
            wifimimo-daemon.py \
            wifimimo-mon.py \
            wifimimo-plasmoid-source.py \
            wifimimo_core.py

      - name: Validate install script syntax
        run: bash -n install.sh

      - name: Validate plasmoid metadata JSON
        run: python -m json.tool plasmoid/org.kde.plasma.wifimimo/metadata.json >/dev/null

      - name: Check version metadata consistency
        run: |
          repo_version="$(cat VERSION)"
          plasmoid_version="$(python -c 'import json; print(json.load(open("plasmoid/org.kde.plasma.wifimimo/metadata.json", encoding="utf-8"))["KPlugin"]["Version"])')"
          test "$repo_version" = "$plasmoid_version"
